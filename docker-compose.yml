services:

  # =========================================================
  # Base de datos CENTRAL (destino)
  # =========================================================
  postgres-central:
    image: postgres:16-alpine
    container_name: postgres-central
    environment:
      POSTGRES_DB: ${CENTRAL_DB_NAME}
      POSTGRES_USER: ${CENTRAL_DB_USER}
      POSTGRES_PASSWORD: ${CENTRAL_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - central_data:/var/lib/postgresql/data
      - ./sql/01_central_bootstrap.sql:/docker-entrypoint-initdb.d/01_central_bootstrap.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CENTRAL_DB_USER} -d ${CENTRAL_DB_NAME}"]
      interval: 10s
      retries: 5
    networks: [etlnet]

  # =========================================================
  # Postgres de METADATOS de Airflow (separado del central)
  # =========================================================
  postgres-airflow:
    image: postgres:16-alpine
    container_name: postgres-airflow
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      retries: 5
    networks: [etlnet]

  # =========================================================
  # EJEMPLOS de bases de datos origen (opcionales, para pruebas)
  # En producción se quitan y se apunta a hosts externos vía .env
  # =========================================================
  source-db1:
    image: postgres:16-alpine
    container_name: source-db1
    environment:
      POSTGRES_DB: ${SOURCE_DB1_DBNAME:-db1}
      POSTGRES_USER: ${SOURCE_DB1_USER:-readonly_user}
      POSTGRES_PASSWORD: ${SOURCE_DB1_PASSWORD:-changeme_db1}
    ports:
      - "5433:5432"
    volumes:
      - source_db1_data:/var/lib/postgresql/data
      - ./sql/seed_db1.sql:/docker-entrypoint-initdb.d/seed_db1.sql:ro
    networks: [etlnet]

  source-db2:
    image: postgres:16-alpine
    container_name: source-db2
    environment:
      POSTGRES_DB: ${SOURCE_DB2_DBNAME:-db2}
      POSTGRES_USER: ${SOURCE_DB2_USER:-readonly_user}
      POSTGRES_PASSWORD: ${SOURCE_DB2_PASSWORD:-changeme_db2}
    ports:
      - "5434:5432"
    volumes:
      - source_db2_data:/var/lib/postgresql/data
      - ./sql/seed_db2.sql:/docker-entrypoint-initdb.d/seed_db2.sql:ro
    networks: [etlnet]

  # =========================================================
  # AIRFLOW: inicialización (crea DB, usuario admin)
  # =========================================================
  airflow-init:
    build: .
    image: pyspark-etl:latest
    container_name: airflow-init
    depends_on:
      postgres-airflow:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USER}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com || true
    env_file: .env
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "30"
      PYTHONPATH: /opt/airflow/app
      RUNTIME_ENV_FILE: /opt/airflow/.env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/app
      - ./logs:/opt/airflow/logs
      - ./.env:/opt/airflow/.env:ro
    networks: [etlnet]

  airflow-webserver:
    build: .
    image: pyspark-etl:latest
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-central:
        condition: service_healthy
    command: webserver
    ports:
      - "8080:8080"
    env_file: .env
    environment: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/app
      - ./logs:/opt/airflow/logs
      - ./.env:/opt/airflow/.env:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      retries: 5
    restart: unless-stopped
    networks: [etlnet]

  airflow-scheduler:
    build: .
    image: pyspark-etl:latest
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-central:
        condition: service_healthy
    command: scheduler
    env_file: .env
    environment: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/app
      - ./logs:/opt/airflow/logs
      - ./.env:/opt/airflow/.env:ro
    restart: unless-stopped
    networks: [etlnet]

volumes:
  central_data:
  airflow_data:
  source_db1_data:
  source_db2_data:

networks:
  etlnet:
    driver: bridge
